<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AV Club - Audio Visual Production</title>
    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        gap: 20px;
        transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
      }
      #splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      #splash-screen img {
        height: 120px;
        animation: splashPulse 0.6s ease-out;
      }
      #splash-screen h2 {
        color: white;
        font-family: 'Montserrat', sans-serif;
        font-size: 1.8rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin: 0;
        animation: textGlow 3s ease-in-out infinite;
      }
      #splash-loader {
        width: 200px;
        height: 3px;
        background: #333;
        border-radius: 2px;
        overflow: hidden;
        margin-top: 10px;
      }
      #splash-loader-bar {
        height: 100%;
        background: #646cff;
        border-radius: 2px;
        animation: loadProgress 2.5s ease-out forwards;
      }
      @keyframes splashPulse {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes textGlow {
        0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        50% { opacity: 0.7; text-shadow: 0 0 30px rgba(255,255,255,0.6); }
      }
      @keyframes loadProgress {
        from { width: 0%; }
        to { width: 100%; }
      }
      @media (max-width: 480px) {
        #splash-screen img { height: 90px; }
        #splash-screen h2 { font-size: 1.4rem; letter-spacing: 2px; }
        #splash-loader { width: 160px; }
      }
      #root {
        opacity: 0;
        transition: opacity 0.5s ease;
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <img src="/school logo.png" alt="MIS" draggable="false" />
      <h2>MIS AV Club</h2>
      <div id="splash-loader">
        <div id="splash-loader-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Keep splash screen for 4.5s then fade out and show React app
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash-screen');
          var root = document.getElementById('root');
          if (splash) {
            splash.classList.add('fade-out');
            // Make root visible after splash fades
            if (root) root.style.opacity = '1';
            setTimeout(function() {
              if (splash) splash.style.display = 'none';
            }, 500);
          }
        }, 2500);
      });
    </script>
  </body>
</html>
