<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/ico/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/ico/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/ico/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/ico/apple-touch-icon.png" />
    <link rel="manifest" href="/ico/site.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AV Club - Audio Visual Production</title>
    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        gap: 24px;
        transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
      }
      #splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #splash-screen img {
        height: 100px;
        opacity: 0;
        animation: fadeIn 0.3s ease-out forwards;
      }
      #splash-screen h2 {
        color: white;
        font-family: 'Montserrat', sans-serif;
        font-size: 1.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin: 0;
        opacity: 0;
        animation: fadeIn 0.3s ease-out 0.1s forwards;
      }
      #splash-loader {
        width: 180px;
        height: 2px;
        background: #2a2a2a;
        border-radius: 1px;
        overflow: hidden;
        margin-top: 8px;
        opacity: 0;
        animation: fadeIn 0.3s ease-out 0.2s forwards;
      }
      #splash-loader-bar {
        height: 100%;
        background: #646cff;
        border-radius: 1px;
        width: 0%;
        transition: width 0.1s linear;
      }
      #splash-status {
        color: #888;
        font-family: 'Montserrat', sans-serif;
        font-size: 0.75rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-top: 4px;
        opacity: 0;
        animation: fadeIn 0.3s ease-out 0.3s forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (max-width: 480px) {
        #splash-screen img { height: 80px; }
        #splash-screen h2 { font-size: 1.3rem; letter-spacing: 1.5px; }
        #splash-loader { width: 140px; }
      }
      #root {
        opacity: 0;
        transition: opacity 0.4s ease;
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <img src="/school logo.png" alt="MIS" draggable="false" />
      <h2>MIS AV Club</h2>
      <div id="splash-loader">
        <div id="splash-loader-bar"></div>
      </div>
      <div id="splash-status">Loading...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Accurate loading progress
      (function() {
        var splash = document.getElementById('splash-screen');
        var loaderBar = document.getElementById('splash-loader-bar');
        var status = document.getElementById('splash-status');
        var root = document.getElementById('root');
        var progress = 0;
        var resourcesLoaded = 0;
        var totalResources = 0;
        var minDisplayTime = 1000; // Minimum time to show splash (prevents flash)
        var startTime = Date.now();

        function updateProgress() {
          loaderBar.style.width = progress + '%';
        }

        function hideSplash() {
          var elapsed = Date.now() - startTime;
          var remaining = Math.max(0, minDisplayTime - elapsed);
          
          setTimeout(function() {
            if (splash) {
              splash.classList.add('fade-out');
              if (root) root.style.opacity = '1';
              setTimeout(function() {
                if (splash) splash.style.display = 'none';
              }, 400);
            }
          }, remaining);
        }

        // Monitor resource loading
        var observer = new PerformanceObserver(function(list) {
          var entries = list.getEntries();
          resourcesLoaded += entries.length;
          // Estimate progress based on resource loading
          progress = Math.min(90, (resourcesLoaded / Math.max(resourcesLoaded + 5, 20)) * 100);
          updateProgress();
        });

        try {
          observer.observe({ entryTypes: ['resource'] });
        } catch(e) {
          // Fallback if PerformanceObserver not supported
          progress = 50;
          updateProgress();
        }

        // Update status text
        var statusMessages = ['Loading...', 'Fetching resources...', 'Preparing...', 'Almost ready...'];
        var statusIndex = 0;
        var statusInterval = setInterval(function() {
          if (progress >= 100 || !splash || splash.classList.contains('fade-out')) {
            clearInterval(statusInterval);
            return;
          }
          statusIndex = (statusIndex + 1) % statusMessages.length;
          status.textContent = statusMessages[statusIndex];
        }, 600);

        // Smooth progress animation
        var progressInterval = setInterval(function() {
          if (progress < 90) {
            progress += 1;
            updateProgress();
          }
        }, 30);

        // When everything is loaded
        window.addEventListener('load', function() {
          clearInterval(progressInterval);
          progress = 100;
          updateProgress();
          status.textContent = 'Ready!';
          
          try {
            observer.disconnect();
          } catch(e) {}
          
          hideSplash();
        });

        // Fallback: hide after 5 seconds max (in case of stuck resources)
        setTimeout(function() {
          if (splash && !splash.classList.contains('fade-out')) {
            progress = 100;
            updateProgress();
            hideSplash();
          }
        }, 5000);
      })();

      // Console warning and developer message
      console.log('%c⚠️ WARNING', 'color: #ff6b6b; font-size: 20px; font-weight: bold;');
      console.log('%cThis is a browser feature intended for developers. Do not paste any scripts here that you do not understand, as it may compromise your security.', 'color: #ffa500; font-size: 12px;');
      console.log('');
      console.log('%c👋 Hey Developer!', 'color: #646cff; font-size: 18px; font-weight: bold;');
      console.log('%cLike what you see? This website was crafted with care by the MIS AV Club.', 'color: #a0a0a0; font-size: 12px;');
      console.log('');
      console.log('%c📧 Contact Us:', 'color: #4ecdc4; font-size: 14px; font-weight: bold;');
      console.log('%c  • Email: avclub@iem.edu.my', 'color: #a0a0a0; font-size: 11px;');
      console.log('%c  • Instagram: @mis.avclub', 'color: #a0a0a0; font-size: 11px;');
      console.log('%c  • Report issues: https://github.com/Binuk1/mis-av-club/issues', 'color: #a0a0a0; font-size: 11px;');
      console.log('');
      console.log('%cThanks for visiting! 🎬', 'color: #646cff; font-size: 12px;');
    </script>
  </body>
</html>
